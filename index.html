<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>卡多里時光森林 × 攤商報名</title>
<style>
:root {
  --forest-bg: #0A1A12;
  --forest-card: rgba(20, 40, 30, 0.7);
  --gold: #D4AF37;
  --gold-glow: rgba(212, 175, 55, 0.4);
  --text-main: #E0E8E3;
  --text-muted: #88A090;
  --danger: #FF6B6B;
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body { 
  font-family: -apple-system, "Noto Sans TC", sans-serif;
  background: var(--forest-bg);
  background-image: radial-gradient(circle at top right, #153024 0%, #0A1A12 100%);
  color: var(--text-main); 
  line-height: 1.6;
}

/* ── Hero ── */
.hero { padding: 45px 20px 25px; text-align: center; }
.hero-logo { font-size: 12px; color: var(--gold); letter-spacing: 4px; margin-bottom: 8px; font-weight: bold; }
.hero-title { font-size: 26px; font-weight: 800; color: #FFF; text-shadow: 0 0 15px var(--gold-glow); }
.hero-title span { color: var(--gold); }

/* ── 進度條 ── */
.progress-wrap { padding: 0 30px 25px; }
.progress-bar { background: rgba(255,255,255,0.1); border-radius: 10px; height: 4px; }
.progress-fill { height: 100%; border-radius: 10px; background: var(--gold); box-shadow: 0 0 8px var(--gold); transition: width .4s ease; }
.step-labels { display: flex; justify-content: space-between; margin-top: 12px; }
.step-label { font-size: 11px; color: var(--text-muted); }
.step-label.active { color: var(--gold); font-weight: bold; }

/* ── 第一頁專屬：介紹 banner ── */
.info-banner {
  margin-bottom: 20px; padding: 20px;
  background: linear-gradient(135deg, rgba(212,175,55,0.15), transparent);
  border: 1px solid var(--gold-glow); border-radius: var(--radius);
}
.info-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
.info-item { font-size: 13px; color: var(--text-main); border-left: 2px solid var(--gold); padding-left: 10px; }
.info-item small { display: block; color: var(--gold); font-weight: bold; font-size: 11px; }

/* ── 表單卡片 ── */
.card { 
  background: var(--forest-card); margin: 0 16px 20px; padding: 24px;
  border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.05);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.card-title { font-size: 16px; font-weight: bold; color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.card-title::before { content:''; width:4px; height:16px; background: var(--gold); border-radius: 2px; }

/* ── 選項格樣式 ── */
.cat-grid, .size-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.cat-item, .size-item {
  background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 15px 10px; text-align: center; border-radius: 12px; transition: 0.3s; cursor: pointer;
}
.cat-item.selected, .size-item.selected { 
  border-color: var(--gold); background: rgba(212, 175, 55, 0.15); color: var(--gold); 
}
.cat-icon { font-size: 24px; margin-bottom: 5px; }
.cat-name, .size-name { font-weight: bold; font-size: 14px; }
.size-dim { font-size: 11px; opacity: 0.6; }

/* ── 通用輸入框 ── */
.form-group { margin-bottom: 20px; }
label { display: block; font-size: 13px; margin-bottom: 8px; color: var(--text-muted); }
label .req { color: var(--danger); }
input, select, textarea {
  width: 100%; padding: 14px; background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
  color: #FFF; font-size: 16px; transition: 0.3s;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--gold); }

/* ── 複選框 ── */
.check-item { 
  display: flex; align-items: center; gap: 12px; padding: 14px; 
  background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 10px; cursor: pointer;
}
.check-item input { width: 18px; height: 18px; accent-color: var(--gold); }

/* ── 按鈕 ── */
.btn-row { padding: 10px 20px 50px; display: flex; gap: 12px; }
.btn { flex: 1; padding: 16px; border-radius: 30px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; }
.btn-main { background: linear-gradient(to right, #D4AF37, #F9E29D); color: #2A1F07; }
.btn-back { background: rgba(255,255,255,0.1); color: #FFF; }

.step-page { display: none; }
.step-page.active { display: block; animation: fadeInUp 0.4s ease-out; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

.has-error input, .has-error select, .has-error textarea { border-color: var(--danger); }
.error-msg { color: var(--danger); font-size: 11px; margin-top: 5px; display: none; }
.has-error .error-msg { display: block; }

/* ── 成功與載入 ── */
#success-screen { display: none; text-align: center; padding: 60px 20px; }
.loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 100; color: var(--gold); font-weight: bold; }
.hidden { display: none; }
.summary-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
.summary-key { color: var(--text-muted); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-logo">🌲 KADORI TIME FOREST</div>
  <div class="hero-title">卡多里<span>時光森林</span>市集</div>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:25%"></div></div>
  <div class="step-labels">
    <span class="step-label active" id="lbl1">基本資料</span>
    <span class="step-label" id="lbl2">類別需求</span>
    <span class="step-label" id="lbl3">營運說明</span>
    <span class="step-label" id="lbl4">確認送出</span>
  </div>
</div>

<div class="step-page active" id="step1">
  <div class="card">
    <div class="info-banner">
      <div class="info-grid">
        <div class="info-item"><small>進駐優勢：</small>因名額有限，採取擇優錄取制，「免場租」低門檻策略。</div>
        <div class="info-item"><small>合作模式：</small>採審核制與「合作分潤模式」，共享收益。</div>
        <div class="info-item"><small>流量核心：</small>大坑精華地段，假日逾 2,000 人次之強勁人流。</div>
      </div>
    </div>
    <div class="card-title">基本聯絡資料</div>
    <div class="form-group" id="fg-businessName">
      <label>攤商/品牌名稱 <span class="req">*</span></label>
      <input type="text" id="businessName" placeholder="例：山林野炊">
      <div class="error-msg">請輸入品牌名稱</div>
    </div>
    <div class="form-group" id="fg-contactName">
      <label>聯絡人姓名 <span class="req">*</span></label>
      <input type="text" id="contactName" placeholder="請輸入真實姓名">
      <div class="error-msg">請輸入姓名</div>
    </div>
    <div class="form-group" id="fg-phone">
      <label>手機號碼 <span class="req">*</span></label>
      <input type="tel" id="phone" placeholder="09XX-XXX-XXX" maxlength="10">
      <div class="error-msg">請輸入正確 10 位手機格式</div>
    </div>
    <div class="form-group">
      <label>LINE ID</label>
      <input type="text" id="lineId" placeholder="請輸入 LINE ID">
    </div>
  </div>
</div>

<div class="step-page" id="step2">
  <div class="card">
    <div class="card-title">選擇攤商類別 <span class="req">*</span></div>
    <div class="cat-grid">
      <div class="cat-item" data-cat="🏕️ 露營裝備"><div class="cat-icon">🏕️</div><div class="cat-name">露營裝備</div></div>
      <div class="cat-item" data-cat="🍳 戶外美食"><div class="cat-icon">🍳</div><div class="cat-name">戶外美食</div></div>
      <div class="cat-item" data-cat="☕ 咖啡茶飲"><div class="cat-icon">☕</div><div class="cat-name">咖啡茶飲</div></div>
      <div class="cat-item" data-cat="🌿 有機農產"><div class="cat-icon">🌿</div><div class="cat-name">農產品</div></div>
      <div class="cat-item" data-cat="🔧 車宿配件"><div class="cat-icon">🔧</div><div class="cat-name">車宿配件</div></div>
      <div class="cat-item" data-cat="🧺 手作工藝"><div class="cat-icon">🧺</div><div class="cat-name">手作工藝</div></div>
    </div>
    <div class="error-msg" id="catError" style="text-align:center; margin-top:10px;">請選擇類別</div>
  </div>
  <div class="card">
    <div class="card-title">攤位尺寸需求 <span class="req">*</span></div>
    <div class="size-grid">
      <div class="size-item" data-size="標準攤位(3x3m)"><div class="size-name">標準</div><div class="size-dim">3x3m</div></div>
      <div class="size-item" data-size
